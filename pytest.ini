[pytest]
# ==============================================
# 1. 自定义标签注册（原有不变）
# ==============================================
markers =
    smoke: 冒烟测试（核心正向流程，1分钟内跑完）
    regression: 全量回归测试（发布前执行所有用例）
    login: 登录模块所有用例
    article: 文章模块所有用例
    positive: 正向场景用例（验证功能正常使用）
    negative: 异常场景用例（验证边界条件和错误处理）
    auth: 鉴权相关用例（Token/Session/权限验证）

# ==============================================
# 2. 全局警告抑制（原有不变）
# ==============================================
filterwarnings =
    ignore:The HMAC key is.*bytes long.*
# 3. 默认执行参数（核心报告配置）
# ==============================================

xfail_strict = true
;log_capture = failed
addopts =
    -v
# 详细输出每个用例的名称和结果
    --tb=short
# 精简错误栈，只显示代码的错误行
    --strict-markers
# 严格模式：未注册的标签直接报错
    --disable-warnings
; 日志配置（解决日志为空问题）
    --capture=sys
; 只捕获stdout/stderr，不捕获logging输出

;     ========== pytest-html 报告配置 ==========
    --html=report/pytest_html/report.html
    --self-contained-html
    --metadata "项目名称" "博客API自动化测试"
    --metadata "测试环境" "pre"
    --metadata "测试人员" "田家宇"
    # ========== Allure 报告配置 ==========
    --alluredir=report/allure-results
    --clean-alluredir


# ==============================================
# 4. 禁用pytest自动logging配置（解决日志为空的核心）
# ==============================================
log_level = NOTSET

# ==============================================
# 5. 测试用例发现规则
# ==============================================
testpaths = testcase
python_files = test_*.py
python_functions = test_*