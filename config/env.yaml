## 激活的环境：修改此处即可切换环境，无需改代码
#active_env: "pre"

pre:
  url : "http://127.0.0.1:5008"
  timeout : 10
prod:
  url : "http://111.229.168.229:5008/"
  timeout : 10
docker_local_api_basic:
  url : "http://api_basic:5009/"
  timeout : 10
active_env : "docker_local_api_basic"

#YAML 是键值对 + 缩进的轻量配置格式，比 JSON 更简洁，核心规则：
#缩进：用2 个空格（不能用 Tab）表示层级，层级对应数据结构的嵌套；
#键值对：键: 值（冒号后必须跟空格），对应 Python 的字典；
#列表：- 元素（短横线后必须跟空格），对应 Python 的列表；
#注释：# 注释内容（仅单行注释）；
#字符串：可加引号（避免特殊字符），也可以不加。


