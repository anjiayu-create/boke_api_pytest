# 登录接口测试数据：正常场景+异常场景
login_cases:
  - case_name: "正常登录-管理员账号"
    username: "admin"
    password: "Admin@123456"
    expect_code: 200
    expect_msg: "登录成功"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-正确用户名 + 错误密码"
    username: "admin"
    password: "123456"
    expect_code: 401
    expect_msg: "用户名/密码错误"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-错误用户名 + 正确密码"
    username: "aadmin"
    password: "Admin@123456"
    expect_code: 401
    expect_msg: "用户名/密码错误"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-空用户名"
    username: ""
    password: "Admin@123456"
    expect_code: 400
    expect_msg: "用户名/密码不能为空"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-空密码"
    username: "admin"
    password: ""
    expect_code: 400
    expect_msg: "用户名/密码不能为空"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-用户名和密码全空"
    username: ""
    password: ""
    expect_code: 400
    expect_msg: "用户名/密码不能为空"
    marks: ["smoke", "positive"]

  - case_name: "异常登录-A用户名+B用户密码登陆"
    username: "admin"
    password: "Test@123456"
    expect_code: 401
    expect_msg: "用户名/密码错误"
    marks: ["smoke", "positive"]





